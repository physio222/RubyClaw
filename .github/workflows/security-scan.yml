# ============================================================================
# RubyClaw Security Scan — Weekly Vulnerability Audit
# Automatically scans dependencies for known vulnerabilities
# ============================================================================

name: 🔒 Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6:00 AM UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 📦 Install dependencies
        run: pnpm install --no-frozen-lockfile
        continue-on-error: true

      - name: 🔍 Run Security Audit
        id: audit
        run: |
          echo "## 🔒 Security Audit Report" > audit-report.md
          echo "" >> audit-report.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> audit-report.md
          echo "**Commit:** ${{ github.sha }}" >> audit-report.md
          echo "" >> audit-report.md
          
          if pnpm audit --json > audit-output.json 2>&1; then
            echo "✅ No vulnerabilities found!" >> audit-report.md
            echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Vulnerabilities detected:" >> audit-report.md
            echo '```json' >> audit-report.md
            cat audit-output.json >> audit-report.md
            echo '```' >> audit-report.md
            echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: 📋 Upload Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: audit-report.md

      - name: 🚨 Create Issue for Vulnerabilities
        if: steps.audit.outputs.has_vulnerabilities == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('audit-report.md', 'utf8');
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔒 Security Alert: Dependency vulnerabilities found (${new Date().toISOString().split('T')[0]})`,
              body: report,
              labels: ['security', 'dependencies']
            });
